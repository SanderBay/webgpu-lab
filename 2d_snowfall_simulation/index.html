<!DOCTYPE html>
<html>

<head>
    <title>WebGPU snowfall simulation</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: #05070a;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            color: white;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 20, 25, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            user-select: none;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
        }

        .row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #4f46e5;
            cursor: ew-resize;
        }

        input[type="number"] {
            width: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 6px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: #4f46e5;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div id="ui-panel">
        <div class="control-group">
            <label>Snow Density</label>
            <div class="row">
                <input type="range" id="count-range" min="100" max="100000" value="1000">
                <input type="number" id="count-number" value="1000">
            </div>
        </div>
        <div class="control-group">
            <label>Wind Direction (Deg)</label>
            <div class="row">
                <input type="range" id="angle-range" min="0" max="360" value="210">
                <input type="number" id="angle-number" value="210">
            </div>
        </div>
        <div class="control-group">
            <label>Wind Power</label>
            <div class="row">
                <input type="range" id="strength-range" min="0" max="100" value="15" step="0.1">
                <input type="number" id="strength-number" value="15" step="0.1">
            </div>
        </div>
        <div class="control-group">
            <label>Gust Surge</label>
            <div class="row">
                <input type="range" id="gust-range" min="0" max="100" value="5" step="0.1">
                <input type="number" id="gust-number" value="5" step="0.1">
            </div>
        </div>
    </div>
    <canvas id="gpu-canvas"></canvas>

    <script>
        // Global error catcher for UI feedback
        window.addEventListener('error', (e) => {
            const errDiv = document.createElement('div');
            errDiv.style.position = 'absolute';
            errDiv.style.top = '10px';
            errDiv.style.right = '10px';
            errDiv.style.background = 'red';
            errDiv.style.color = 'white';
            errDiv.style.padding = '10px';
            errDiv.style.zIndex = '9999';
            errDiv.textContent = 'JS Error: ' + e.message;
            document.body.appendChild(errDiv);
        });
    </script>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
